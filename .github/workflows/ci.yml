name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install test runner
        run: python -m pip install pytest pillow
      - name: Install official validator system tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends gettext
      - name: Validate source and shell syntax
        run: |
          python scripts/validate.py
          sh -n scripts/install.sh
          sh -n scripts/package.sh
          for file in files/codex-monitor@breixopd/*.js; do node --check "$file"; done
      - name: Test
        run: npm test
      - name: Build distributable
        run: sh scripts/package.sh
      - name: Check out the pinned official Cinnamon validator
        uses: actions/checkout@v4
        with:
          repository: linuxmint/cinnamon-spices-applets
          ref: 5b4240a93b32b2171e672ae3e86e4649a447d4cf
          path: .official-spices
          sparse-checkout: validate-spice
          sparse-checkout-cone-mode: false
      - name: Run official Cinnamon Spices validation
        run: |
          cp -a dist/spices/codex-monitor@breixopd .official-spices/
          cd .official-spices
          python ./validate-spice codex-monitor@breixopd
      - name: Verify archive contains no private or generated files
        run: |
          unzip -Z1 dist/codex-monitor@breixopd.zip > archive-files.txt
          ! grep -E '(__pycache__|\.py[co]$|\.env|\.pem$|\.key$)' archive-files.txt
      - uses: actions/upload-artifact@v4
        with:
          name: codex-monitor-cinnamon
          path: dist/codex-monitor@breixopd.zip
